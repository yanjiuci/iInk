<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>壁纸网格展示</title>
  <meta name="theme-color" content="#0b74ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <!-- Google Fonts - 中文字体库 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Long+Cang&family=Liu+Jian+Mao+Cao&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@100..900&family=Noto+Serif+SC:wght@200..900&family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+XiaoWei&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
</head>
<body>
  <header class="app-header">
    <h1>壁纸库</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="filters" id="filters"></div>
      <button id="installBtn" class="button" style="display:none">添加到主屏幕</button>
      <button id="userBtn" class="button">个人中心</button>
    </div>
  </header>

  <main>
    <div id="pullToRefresh" class="pull-area">下拉刷新</div>
    <section id="grid" class="grid" aria-live="polite"></section>
  </main>

  <template id="tile-template">
    <article class="tile">
      <div class="tile-media">
        <img alt="壁纸" class="tile-img" loading="lazy">
      </div>
      <div class="tile-meta">
        <div class="title"></div>
        <div class="category"></div>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="edit-btn button">编辑</button>
          <button class="save-btn button">保存</button>
          <button class="like-btn button">♥</button>
          <span class="like-count" style="font-size:13px;color:#666;min-width:28px;display:inline-block;text-align:center">0</span>
          <button class="comment-btn button">评论</button>
          <span class="comment-count" style="font-size:13px;color:#666;min-width:24px;display:inline-block;text-align:center">0</span>
        </div>
      </div>
    </article>
  </template>

  <!-- Image Editor Modal - 专业图片编辑器 -->
  <div id="editorModal" class="editor-modal" aria-hidden="true" style="display:none;position:fixed;inset:0;z-index:1000;">
    <div class="editor-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,0.85);"></div>
    
    <div class="editor-container" style="position:relative;height:100vh;display:flex;flex-direction:column;">
      <!-- 顶部工具栏 -->
      <div class="editor-toolbar" style="display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#1a1a1a;color:#fff;border-bottom:1px solid #333;">
        <div style="display:flex;gap:16px;align-items:center;">
          <button id="editorClose" class="toolbar-btn" style="background:none;border:none;color:#fff;cursor:pointer;font-size:20px;">✕</button>
          <span style="font-weight:600;font-size:16px;">图片编辑器</span>
        </div>
        <div style="display:flex;gap:8px;">
          <button id="editorUndo" class="toolbar-btn" title="撤销" style="padding:8px 12px;background:#333;border:none;border-radius:6px;color:#fff;cursor:pointer;">↩ 撤销</button>
          <button id="editorRedo" class="toolbar-btn" title="重做" style="padding:8px 12px;background:#333;border:none;border-radius:6px;color:#fff;cursor:pointer;">↪ 重做</button>
          <button id="editorReset" class="toolbar-btn" title="重置" style="padding:8px 12px;background:#333;border:none;border-radius:6px;color:#fff;cursor:pointer;">⟲ 重置</button>
          <button id="editorSaveBtn" class="toolbar-btn" style="padding:8px 20px;background:#0b74ff;border:none;border-radius:6px;color:#fff;cursor:pointer;font-weight:600;">保存</button>
          <button id="editorExportBtn" class="toolbar-btn" style="padding:8px 20px;background:#28a745;border:none;border-radius:6px;color:#fff;cursor:pointer;font-weight:600;">导出</button>
        </div>
      </div>

      <!-- 主编辑区域 -->
      <div style="flex:1;display:flex;overflow:hidden;">
        <!-- 左侧工具栏 -->
        <div class="editor-sidebar-left" style="width:60px;background:#1a1a1a;border-right:1px solid #333;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:8px;">
          <button class="tool-btn active" data-tool="adjust" title="调节" style="width:44px;height:44px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:18px;">⚡</button>
          <button class="tool-btn" data-tool="filter" title="滤镜" style="width:44px;height:44px;background:transparent;border:none;border-radius:8px;color:#999;cursor:pointer;font-size:18px;">🎨</button>
          <button class="tool-btn" data-tool="crop" title="裁剪旋转" style="width:44px;height:44px;background:transparent;border:none;border-radius:8px;color:#999;cursor:pointer;font-size:18px;">✂️</button>
          <button class="tool-btn" data-tool="text" title="文字" style="width:44px;height:44px;background:transparent;border:none;border-radius:8px;color:#999;cursor:pointer;font-size:18px;">T</button>
          <button class="tool-btn" data-tool="sticker" title="贴纸" style="width:44px;height:44px;background:transparent;border:none;border-radius:8px;color:#999;cursor:pointer;font-size:18px;">😊</button>
        </div>

        <!-- 画布区域 -->
        <div style="flex:1;display:flex;align-items:center;justify-content:center;background:#0d0d0d;padding:20px;overflow:auto;">
          <div id="editorContainer" style="position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.5);"></div>
        </div>

        <!-- 右侧面板 -->
        <div class="editor-sidebar-right" style="width:320px;background:#1a1a1a;border-left:1px solid #333;overflow-y:auto;">
          
          <!-- 调节面板 -->
          <div id="adjustPanel" class="tool-panel" style="padding:16px;">
            <div style="font-weight:600;color:#fff;margin-bottom:16px;font-size:14px;">基础调节</div>
            
            <div class="control-group" style="margin-bottom:16px;">
              <label style="display:flex;justify-content:space-between;color:#ccc;font-size:12px;margin-bottom:6px;">
                <span>亮度</span><span id="val-brightness">100%</span>
              </label>
              <input id="slider-brightness" type="range" min="0" max="2" step="0.01" value="1" style="width:100%;">
            </div>

            <div class="control-group" style="margin-bottom:16px;">
              <label style="display:flex;justify-content:space-between;color:#ccc;font-size:12px;margin-bottom:6px;">
                <span>对比度</span><span id="val-contrast">100%</span>
              </label>
              <input id="slider-contrast" type="range" min="0" max="2" step="0.01" value="1" style="width:100%;">
            </div>

            <div class="control-group" style="margin-bottom:16px;">
              <label style="display:flex;justify-content:space-between;color:#ccc;font-size:12px;margin-bottom:6px;">
                <span>饱和度</span><span id="val-saturate">100%</span>
              </label>
              <input id="slider-saturate" type="range" min="0" max="3" step="0.01" value="1" style="width:100%;">
            </div>

            <div style="font-weight:600;color:#fff;margin:20px 0 16px;font-size:14px;">高级调节</div>

            <div class="control-group" style="margin-bottom:16px;">
              <label style="display:flex;justify-content:space-between;color:#ccc;font-size:12px;margin-bottom:6px;">
                <span>色温</span><span id="val-warmth">0</span>
              </label>
              <input id="slider-warmth" type="range" min="-1" max="1" step="0.01" value="0" style="width:100%;">
            </div>

            <div class="control-group" style="margin-bottom:16px;">
              <label style="display:flex;justify-content:space-between;color:#ccc;font-size:12px;margin-bottom:6px;">
                <span>色调</span><span id="val-tint">0</span>
              </label>
              <input id="slider-tint" type="range" min="-1" max="1" step="0.01" value="0" style="width:100%;">
            </div>

            <div class="control-group" style="margin-bottom:16px;">
              <label style="display:flex;justify-content:space-between;color:#ccc;font-size:12px;margin-bottom:6px;">
                <span>自然饱和度</span><span id="val-vibrance">0</span>
              </label>
              <input id="slider-vibrance" type="range" min="-1" max="1" step="0.01" value="0" style="width:100%;">
            </div>

            <div class="control-group" style="margin-bottom:16px;">
              <label style="display:flex;justify-content:space-between;color:#ccc;font-size:12px;margin-bottom:6px;">
                <span>高光</span><span id="val-highlights">0</span>
              </label>
              <input id="slider-highlights" type="range" min="-1" max="1" step="0.01" value="0" style="width:100%;">
            </div>

            <div class="control-group" style="margin-bottom:16px;">
              <label style="display:flex;justify-content:space-between;color:#ccc;font-size:12px;margin-bottom:6px;">
                <span>阴影</span><span id="val-shadows">0</span>
              </label>
              <input id="slider-shadows" type="range" min="-1" max="1" step="0.01" value="0" style="width:100%;">
            </div>

            <div class="control-group" style="margin-bottom:16px;">
              <label style="display:flex;justify-content:space-between;color:#ccc;font-size:12px;margin-bottom:6px;">
                <span>暗角</span><span id="val-vignette">0</span>
              </label>
              <input id="slider-vignette" type="range" min="0" max="1" step="0.01" value="0" style="width:100%;">
            </div>

            <div class="control-group" style="margin-bottom:16px;">
              <label style="display:flex;justify-content:space-between;color:#ccc;font-size:12px;margin-bottom:6px;">
                <span>模糊</span><span id="val-blur">0</span>
              </label>
              <input id="slider-blur" type="range" min="0" max="20" step="0.5" value="0" style="width:100%;">
            </div>

            <div class="control-group" style="margin-bottom:16px;">
              <label style="display:flex;justify-content:space-between;color:#ccc;font-size:12px;margin-bottom:6px;">
                <span>色相</span><span id="val-hue">0°</span>
              </label>
              <input id="slider-hue" type="range" min="-180" max="180" step="1" value="0" style="width:100%;">
            </div>

            <div class="control-group" style="margin-bottom:16px;">
              <label style="display:flex;justify-content:space-between;color:#ccc;font-size:12px;margin-bottom:6px;">
                <span>透明度</span><span id="val-opacity">100%</span>
              </label>
              <input id="slider-opacity" type="range" min="0" max="1" step="0.01" value="1" style="width:100%;">
            </div>
          </div>

          <!-- 滤镜面板 -->
          <div id="filterPanel" class="tool-panel" style="padding:16px;display:none;">
            <div style="font-weight:600;color:#fff;margin-bottom:16px;font-size:14px;">滤镜预设</div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
              <button class="filter-btn" data-filter="none" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">原图</button>
              <button class="filter-btn" data-filter="beauty" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">美颜</button>
              <button class="filter-btn" data-filter="portrait" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">人像</button>
              <button class="filter-btn" data-filter="vivid" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">鲜艳</button>
              <button class="filter-btn" data-filter="warm" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">暖色</button>
              <button class="filter-btn" data-filter="cool" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">冷色</button>
              <button class="filter-btn" data-filter="vintage" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">复古</button>
              <button class="filter-btn" data-filter="retro" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">怀旧</button>
              <button class="filter-btn" data-filter="film" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">胶片</button>
              <button class="filter-btn" data-filter="landscape" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">风景</button>
              <button class="filter-btn" data-filter="nature" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">自然</button>
              <button class="filter-btn" data-filter="sunset" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">日落</button>
              <button class="filter-btn" data-filter="noir" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">黑白</button>
              <button class="filter-btn" data-filter="dramatic" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">戏剧</button>
              <button class="filter-btn" data-filter="bw" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">灰度</button>
              <button class="filter-btn" data-filter="food" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">美食</button>
              <button class="filter-btn" data-filter="night" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">夜景</button>
              <button class="filter-btn" data-filter="cyberpunk" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">赛博</button>
              <button class="filter-btn" data-filter="moody" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;"> Moody</button>
              <button class="filter-btn" data-filter="fade" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">褪色</button>
              <button class="filter-btn" data-filter="sepia" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;"> sepia</button>
              <button class="filter-btn" data-filter="grayscale" style="padding:12px 8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">黑白</button>
            </div>
          </div>

          <!-- 裁剪旋转面板 -->
          <div id="cropPanel" class="tool-panel" style="padding:16px;display:none;">
            <div style="font-weight:600;color:#fff;margin-bottom:16px;font-size:14px;">旋转与翻转</div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px;">
              <button id="rotateLeft" class="action-btn" style="padding:12px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;">↺ 左转90°</button>
              <button id="rotateRight" class="action-btn" style="padding:12px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;">↻ 右转90°</button>
              <button id="flipH" class="action-btn" style="padding:12px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;">⇄ 水平翻转</button>
              <button id="flipV" class="action-btn" style="padding:12px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;">⇅ 垂直翻转</button>
            </div>
            
            <div style="font-weight:600;color:#fff;margin-bottom:16px;font-size:14px;">快速裁剪</div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
              <button class="crop-btn" data-ratio="1:1" style="padding:12px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">1:1</button>
              <button class="crop-btn" data-ratio="4:3" style="padding:12px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">4:3</button>
              <button class="crop-btn" data-ratio="16:9" style="padding:12px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">16:9</button>
              <button class="crop-btn" data-ratio="3:4" style="padding:12px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">3:4</button>
              <button class="crop-btn" data-ratio="9:16" style="padding:12px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">9:16</button>
              <button class="crop-btn" data-ratio="free" style="padding:12px;background:#0b74ff;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;">自由</button>
            </div>
          </div>

          <!-- 文字面板 -->
          <div id="textPanel" class="tool-panel" style="padding:16px;display:none;">
            <div style="font-weight:600;color:#fff;margin-bottom:16px;font-size:14px;">添加文字</div>
            
            <div class="control-group" style="margin-bottom:12px;">
              <input id="editorText" placeholder="输入文字..." style="width:100%;padding:10px;border:1px solid #444;border-radius:6px;background:#333;color:#fff;font-size:14px;">
            </div>

            <div class="control-group" style="margin-bottom:12px;">
              <label style="color:#ccc;font-size:12px;margin-bottom:6px;display:block;">字体</label>
              <select id="editorFont" style="width:100%;padding:8px;border:1px solid #444;border-radius:6px;background:#333;color:#fff;font-size:13px;">
                <option value="sans-serif">无衬线</option>
                <option value="serif">衬线</option>
                <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
                <option value="'SimSun', serif">宋体</option>
                <option value="'KaiTi', serif">楷体</option>
                <option value="'SimHei', sans-serif">黑体</option>
                <option value="'LiSu', serif">隶书</option>
                <option value="'STXingkai', cursive">华文行楷</option>
                <option value="'Ma Shan Zheng', cursive">马善政毛笔</option>
                <option value="'Zhi Mang Xing', cursive">志莽行书</option>
                <option value="'Long Cang', cursive">龙苍书法</option>
                <option value="'Liu Jian Mao Cao', cursive">刘建草书</option>
                <option value="'ZCOOL XiaoWei', serif">站酷小薇</option>
                <option value="'ZCOOL KuaiLe', cursive">站酷快乐</option>
                <option value="'Noto Serif SC', serif">思源宋体</option>
                <option value="'Noto Sans SC', sans-serif">思源黑体</option>
              </select>
            </div>

            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px;">
              <div class="control-group">
                <label style="color:#ccc;font-size:12px;margin-bottom:6px;display:block;">字号</label>
                <input id="editorFontSize" type="range" min="12" max="200" value="48" style="width:100%;">
                <span id="editorFontSizeValue" style="color:#999;font-size:11px;">48px</span>
              </div>
              <div class="control-group">
                <label style="color:#ccc;font-size:12px;margin-bottom:6px;display:block;">颜色</label>
                <input id="editorTextColor" type="color" value="#ffffff" style="width:100%;height:36px;border:none;border-radius:6px;cursor:pointer;">
              </div>
            </div>

            <div style="display:flex;gap:8px;margin-bottom:12px;">
              <button id="textBold" class="toggle-btn" style="flex:1;padding:10px;background:#333;border:1px solid #444;border-radius:6px;color:#fff;cursor:pointer;font-weight:bold;">B</button>
              <button id="textItalic" class="toggle-btn" style="flex:1;padding:10px;background:#333;border:1px solid #444;border-radius:6px;color:#fff;cursor:pointer;font-style:italic;">I</button>
            </div>

            <div class="control-group" style="margin-bottom:12px;">
              <label style="color:#ccc;font-size:12px;margin-bottom:6px;display:block;">旋转</label>
              <input id="textRotation" type="range" min="-180" max="180" value="0" style="width:100%;">
              <span id="textRotationValue" style="color:#999;font-size:11px;">0°</span>
            </div>

            <div class="control-group" style="margin-bottom:12px;">
              <label style="color:#ccc;font-size:12px;margin-bottom:6px;display:block;">透明度</label>
              <input id="textOpacity" type="range" min="0" max="1" step="0.01" value="1" style="width:100%;">
            </div>

            <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;">
              <input type="checkbox" id="textStroke" checked style="width:16px;height:16px;">
              <label for="textStroke" style="color:#ccc;font-size:12px;">描边</label>
              <input type="checkbox" id="textShadow" checked style="width:16px;height:16px;margin-left:16px;">
              <label for="textShadow" style="color:#ccc;font-size:12px;">阴影</label>
            </div>

            <button id="addTextBtn" class="button" style="width:100%;padding:12px;background:#0b74ff;border:none;border-radius:6px;color:#fff;cursor:pointer;font-weight:600;">添加文字</button>

            <!-- 图层管理 -->
            <div id="layerManager" style="margin-top:20px;border-top:1px solid #333;padding-top:16px;">
              <div style="font-weight:600;color:#fff;margin-bottom:12px;font-size:14px;">图层管理</div>
              <div id="layerList" style="max-height:200px;overflow-y:auto;"></div>
            </div>
          </div>

          <!-- 贴纸面板 -->
          <div id="stickerPanel" class="tool-panel" style="padding:16px;display:none;">
            <div style="font-weight:600;color:#fff;margin-bottom:16px;font-size:14px;">贴纸</div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
              <button class="sticker-btn" data-emoji="😀" style="padding:16px;background:#333;border:none;border-radius:8px;font-size:28px;cursor:pointer;">😀</button>

  <!-- Image Preview Modal -->
  <div id="previewModal" class="preview-modal" aria-hidden="true" style="display:none;position:fixed;inset:0;z-index:1100;">
    <div class="preview-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,0.75);"></div>
    <div class="preview-panel" style="position:relative;margin:40px auto;max-width:90%;max-height:90%;display:flex;align-items:center;justify-content:center;z-index:1;">
      <button id="previewClose" class="button" style="position:absolute;right:8px;top:8px;z-index:2;">关闭</button>
      <img id="previewImage" src="" alt="预览" style="max-width:100%;max-height:100%;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,0.5);" />
    </div>
  </div>

  <!-- Comment Modal -->
  <div id="commentModal" class="comment-modal" aria-hidden="true" style="display:none;position:fixed;inset:0;z-index:1250;">
    <div class="comment-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,0.6);"></div>
    <div class="comment-panel" style="position:relative;margin:40px auto;max-width:720px;background:#fff;border-radius:8px;padding:12px;z-index:1;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-weight:600">评论</div>
        <div>
          <button id="commentClose" class="button">关闭</button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div id="commentList" style="max-height:360px;overflow:auto;border:1px solid #eee;padding:8px;border-radius:6px;background:#fafafa"></div>
        <div style="display:flex;gap:8px;align-items:center;">
          <input id="commentInput" placeholder="输入评论..." style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px" />
          <button id="commentAddBtn" class="button">添加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- User Profile / Upload Modal -->
  <div id="userModal" class="user-modal" aria-hidden="true" style="display:none;position:fixed;inset:0;z-index:1200;">
    <div class="user-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,0.6);"></div>
    <div class="user-panel" style="position:relative;margin:40px auto;max-width:900px;background:#fff;border-radius:8px;padding:12px;z-index:1;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-weight:600">个人中心</div>
        <div>
          <button id="userClose" class="button">关闭</button>
        </div>
      </div>
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="flex:1;min-width:300px;max-height:60vh;overflow:auto;border:1px solid #eee;padding:12px;">
          <div style="margin-bottom:8px;">
            <label style="display:block;font-weight:600;margin-bottom:6px;">上传图片</label>
            <input id="uploadInput" type="file" accept="image/*" multiple />
            <div style="margin-top:8px;color:#666;font-size:13px">支持多图上传，会压缩并存入本地（仅用于演示）。</div>
          </div>
          <div>
            <div style="font-weight:600;margin-bottom:6px;">我的上传</div>
            <div id="uploadGallery" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px"></div>
          </div>
        </div>
        <div style="width:320px;max-height:60vh;overflow:auto;">
          <div style="display:flex;flex-direction:column;gap:8px;">
            <div style="font-weight:600">说明</div>
            <div style="color:#666;font-size:13px">上传的图片会添加到壁纸库顶部，并保存在本地存储用于页面刷新时恢复。若需长期存储请接入服务器或 IndexedDB。</div>
          </div>
        </div>
      </div>
    </div>
  </div>
